---
project_emoji: "\U0001F3C1"
engines:
- ruby
- jruby
- truffleruby
repository:
  topology: standalone
workflows:
  exec_cmd: kettle-test
  recording: false
  preset: framework
  framework_matrix:
    dimension: activerecord
    versions:
    - '5.2'
    - '6.0'
    - '6.1'
    - '7.0'
    - '7.1'
    - '7.2'
    - '8.0'
    gemfile_pattern: ar-{version}.x
    appraisal_gemfiles:
    - modular/activerecord_support.gemfile
appraisal_matrix:
  mode: minor
  exec_cmd: kettle-test
  gems:
    tier1:
    - name: activerecord
      requirements:
      - ">= 5.2"
      - "< 8.1"
      versions:
      - '5.2'
      - '6.0'
      - '6.1'
      - '7.0'
      - '7.1'
      - '7.2'
      - '8.0'
    tier2: []
  resolved_at: 1779706091
readme:
  top_logos: related-org,ruby,org
licenses:
- MIT
license_eye:
  dependency_licenses:
  - name: simplecov-rcov
    version: 0.3.7
    license: MIT
machine_users:
- autobolt
min_divergence_threshold:
yard_host: flag-shih-tzu.galtzo.com
homepage_uri: https://github.com/galtzo-floss/flag_shih_tzu
templates:
  root: packaged
  apply: true
  profile: full
plugins:
- kettle-drift
defaults:
  preference: template
  add_template_only_nodes: true
  freeze_token: kettle-jem
tokens:
  forge:
    gh_user: galtzo-floss
    gl_user: galtzo-floss
    cb_user: galtzo-floss
    sh_user: galtzo
  author:
    name: Peter H. Boling
    given_names: Peter H.
    family_names: Boling
    email: floss@galtzo.com
    domain: galtzo.com
    orcid: '0009-0008-8519-441X'
  funding:
    patreon: galtzo
    kofi: pboling
    paypal: peterboling
    buymeacoffee: pboling
    polar: pboling
    liberapay: pboling
    issuehunt: pboling
  social:
    mastodon: galtzo
    bluesky: galtzo.com
    linktree: galtzo
    devto: galtzo
patterns:
- path: certs/**
  strategy: raw_copy
files:
  AGENTS.md:
    strategy: accept_template
  ".github":
    copilot_instructions.md:
      strategy: accept_template
  gemfiles:
    modular:
      templating.gemfile:
        strategy: accept_template
      templating_local.gemfile:
        strategy: accept_template
